<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #434647;
            --bar-bg: #1e293b;
            /* グラデーション用の色定義 */
            --grad-1: #38bdf8;
            --grad-2: #818cf8;
            --grad-3: #c084fc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* アプリ名のアニメーション: 動きを排除し色のみ変化 */
        .app-name {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            padding-bottom: 0.2em;
            letter-spacing: -0.01em; /* 固定 */
            
            /* グラデーションテキストの設定 */
            background: linear-gradient(
                to right, 
                var(--grad-1), 
                var(--grad-2), 
                var(--grad-3), 
                var(--grad-1)
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* アニメーション: フェードインと色の変化のみ */
            display: inline-block;
            animation: 
                simpleFadeIn 1s ease-out forwards,
                shimmer 4s linear infinite;
        }

        .loader-container {
            width: 240px;
            height: 3px;
            background-color: var(--bar-bg);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .loader-bar {
            width: 60px;
            height: 100%;
            background: linear-gradient(to right, transparent, var(--accent-color), transparent);
            position: absolute;
            animation: loading 1.8s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-text {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* 純粋なフェードイン（位置の変化なし） */
        @keyframes simpleFadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* グラデーションの輝きアニメーション */
        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }

        /* 読み込みバーのアニメーション（こちらは動きがないとフリーズに見えるため維持） */
        @keyframes loading {
            0% {
                left: -30%;
            }
            100% {
                left: 130%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="app-name">quartet theia</h1>
        
        <div>
            <div class="loader-container">
                <div class="loader-bar"></div>
            </div>
            <div class="status-text">System Booting...</div>
        </div>
    </div>
</body>
</html>
